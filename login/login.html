<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../Bootstrap-fonts-and-icons/bootstrap-icons.css">
    <script src="login.js" defer></script>
</head>
<body>
    <img src="../pictures/school-badge.png" alt="哈尔滨工业大学" class="logo">
    <div class="welcome">
        <h1>
            Welcome to LLM college simulator!
        </h1>
        <button onclick="logining()">login</button>
    </div>
    <div class="blur-overlay" id="blur-overlay"></div>
    <div class="wrapper" id="wrapper">
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon">
                        <i class="bi bi-envelope-at-fill"></i></span>
                    <input type="email"  required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <i class="bi bi-lock-fill"></i></span>
                    <input type="password"  required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox">Remember me</label>
                    <a href="#">Forgot your password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
